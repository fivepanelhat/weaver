
name: CI Scan
on:
  schedule:
    - cron: "0 */8 * * *"
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]
permissions:
  contents: read
  packages: read
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run linters
        run: flake8 .
      - name: Run tests
        run: pytest
