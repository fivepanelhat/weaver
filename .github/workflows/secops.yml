name: "Weaver SecOps Scan"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  secops-scan:
    name: SAST and Supply Chain Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install bandit pip-audit

      - name: Run Bandit SAST Scan
        run: |
          bandit -r . --exclude ./.venv,./tests -ll -ii --exit-zero

      - name: Run pip-audit Supply Chain Scan
        run: |
          pip-audit -r requirements.txt --skip-editable || true
